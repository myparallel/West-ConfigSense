var pool=[{n:'溶解氧 DO',c:'WQ-001',v:'6.82',t:1},{n:'水温',c:'WQ-002',v:'26.3',t:1},{n:'pH值',c:'WQ-003',v:'7.82',t:1},{n:'氨氮',c:'WQ-004',v:'0.05',t:1},{n:'土壤湿度',c:'SL-001',v:'52.4',t:1},{n:'EC电导率',c:'SL-004',v:'1.28',t:0}];
var poolS=[],curL=0,curI=0,curT=0,penI=0,subs=[0,0,0];
function $(id){return document.getElementById(id)}
function showToast(m){var t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._v);t._v=setTimeout(function(){t.classList.remove('show')},2000)}
// Tab
function goTab(i){curT=i;var t=document.querySelectorAll('.tab-item'),p=['p0','p1','p2','p3','p4'];for(var j=0;j<t.length;j++)t[j].className=j===i?'tab-item active':'tab-item';for(var j=0;j<p.length;j++){var pg=$(p[j]);if(pg)pg.className=j===i?'page active':'page'}if(i===0)refreshHome();if(i===1)refreshMon();if(i===2)refreshDev();if(i===3)refreshData()}
function showSub(p,s){subs[p]=s;var navs=document.querySelectorAll('#p'+p+' .subnav .sn');for(var i=0;i<navs.length;i++)navs[i].className=i===s?'sn active':'sn';for(var i=0;i<3;i++){var el=$('s'+p+''+i);if(el)el.style.display=i===s?'':'none'}if(p===1&&s===1)refreshPool();if(p===3&&s===1)refreshAlarm();if(p===3&&s===2)refreshHist()}
// Industry
function showIndPicker(){penI=curI;var c=document.querySelectorAll('.ind-modal .card');for(var i=0;i<c.length;i++)c[i].className=i===curI?'card active':'card';$('indModal').classList.add('show')}
function hideInd(){$('indModal').classList.remove('show')}
function pickInd(i){penI=i;var c=document.querySelectorAll('.ind-modal .card');for(var j=0;j<c.length;j++)c[j].className=j===i?'card active':'card'}
function confirmInd(){if(penI!==curI){curI=penI;curL=0;updateBanner();goTab(curT);showToast('已切换到: '+IND[curI].name)}hideInd()}
function updateBanner(){var d=IND[curI];$('bannerBg').style.backgroundImage='url('+d.banner+')';$('indName').textContent=d.name;$('indSub').textContent=d.sub}
// Home
function refreshHome(){var d=IND[curI];$('homeTitle').textContent=d.pref+'实时总览';var l=$('locRow');l.innerHTML='';for(var i=0;i<d.loc.length;i++){var ch=document.createElement('span');ch.className=i===curL?'chip active':'chip';ch.textContent=d.loc[i];ch.onclick=function(j){return function(){curL=j;refreshHome()}}(i);l.appendChild(ch)}var dt=d.val[curL]||d.val[0];var s=$('stats');s.innerHTML='<div class="stat"><div class="v" style="color:#0288d1">'+d.loc.length+'个</div><div class="l">'+d.lp+'数</div></div><div class="stat"><div class="v" style="color:#4caf50">'+d.dev.filter(function(x){return x.s===1}).length+'/'+d.dev.length+'</div><div class="l">设备在线</div></div><div class="stat"><div class="v" style="color:#ff9800">'+d.alm.filter(function(x){return x.b===0}).length+'</div><div class="l">报警</div></div><div class="stat"><div class="v" style="color:#7b1fa2">'+d.par.length+'</div><div class="l">指标</div></div>';var pg=$('params');pg.innerHTML='';for(var i=0;i<d.par.length;i++){var p=d.par[i],v=dt[p.k],dv=typeof v==='number'?(Number.isInteger(v)?v:v.toFixed(2)):v;var pc=document.createElement('div');pc.className='param';pc.innerHTML='<div class="bar" style="background:'+p.c+'"></div><div class="pl">'+p.l+'</div><div class="pv" style="color:'+p.c+'">'+dv+'</div><div class="pu">'+p.u+'</div><div class="ps ok">正常</div>';pc.onclick=function(k){return function(){openDetail(k)}}(p.k);pg.appendChild(pc)}var ds=$('devStrip');ds.innerHTML='';for(var i=0;i<d.dev.length;i++){var di=document.createElement('div');di.style.cssText='background:#fff;border:1px solid #e4e9f2;border-radius:7px;padding:6px 10px;min-width:85px;text-align:center;flex-shrink:0;cursor:pointer';di.innerHTML='<div style="font-size:10px;color:#37474f;white-space:nowrap">'+d.dev[i].n+'</div><div style="font-size:8px;margin-top:2px;padding:1px 6px;border-radius:4px;display:inline-block;background:'+(d.dev[i].s===1?'#e8f5e9':'#f5f5f5')+';color:'+(d.dev[i].s===1?'#4caf50':'#9e9e9e')+'">'+(d.dev[i].s===1?'运行中':'停止')+'</div>';ds.appendChild(di)}}
// Monitor
function refreshMon(){var d=IND[curI];var l=$('monLoc');l.innerHTML='';for(var i=0;i<d.loc.length;i++){var ch=document.createElement('span');ch.className=i===curL?'chip active':'chip';ch.textContent=d.loc[i];ch.onclick=function(j){return function(){curL=j;refreshMon()}}(i);l.appendChild(ch)}var dt=d.val[curL]||d.val[0];var pg=$('monParams');pg.innerHTML='';for(var i=0;i<d.par.length;i++){var p=d.par[i],v=dt[p.k],dv=typeof v==='number'?(Number.isInteger(v)?v:v.toFixed(2)):v;var pc=document.createElement('div');pc.className='param';pc.innerHTML='<div class="bar" style="background:'+p.c+'"></div><div class="pl">'+p.l+'</div><div class="pv" style="color:'+p.c+'">'+dv+'</div><div class="pu">'+p.u+'</div><div class="ps ok">实时</div>';pc.onclick=function(k){return function(){openDetail(k)}}(p.k);pg.appendChild(pc)}}
function refreshPool(){var h='';for(var i=0;i<pool.length;i++){var p=pool[i],ck=poolS.indexOf(p.c)>=0?'checked':'';h+='<div style="display:flex;align-items:center;padding:6px 8px;border-bottom:1px solid #eceff1;cursor:pointer;background:#fff" onclick="toggleP(\''+p.c+'\')"><div style="width:16px;margin-right:6px"><input type="checkbox" '+ck+' style="width:14px;height:14px;accent-color:#0288d1"></div><div style="flex:1"><div style="font-size:11px;color:#37474f">'+p.n+'</div><div style="font-size:8px;color:#b0bec5">'+p.c+'</div></div><div style="font-size:13px;font-weight:600;font-family:monospace;margin-right:6px;color:'+(p.t?'#4caf50':'#ff9800')+'">'+p.v+'</div><span style="font-size:8px;padding:1px 5px;border-radius:3px;background:'+(p.t?'#e8f5e9':'#fff3e0')+';color:'+(p.t?'#4caf50':'#ff9800')+'">'+(p.t?'正常':'偏高')+'</span></div>'}var tbl=$('poolTable');if(tbl)tbl.innerHTML=h;$('poolC').textContent='已选'+poolS.length+'项'}
function toggleP(c){var i=poolS.indexOf(c);if(i>=0)poolS.splice(i,1);else poolS.push(c);refreshPool()}
// Device
function refreshDev(){var d=IND[curI];var l=$('devLoc');l.innerHTML='';for(var i=0;i<d.loc.length;i++){var ch=document.createElement('span');ch.className=i===curL?'chip active':'chip';ch.textContent=d.loc[i];ch.onclick=function(j){return function(){curL=j;refreshDev()}}(i);l.appendChild(ch)}var dl=$('devList');dl.innerHTML='';for(var i=0;i<d.dev.length;i++){var di=document.createElement('div');di.style.cssText='display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e4e9f2;border-radius:7px;padding:7px 10px;margin-bottom:4px;cursor:pointer';di.innerHTML='<div><div style="font-size:11px;color:#37474f">'+d.dev[i].n+'</div><div style="font-size:9px;color:#90a4ae">'+d.loc[curL]+'</div></div><span style="font-size:9px;padding:1px 6px;border-radius:4px;background:'+(d.dev[i].s===1?'#e8f5e9':'#f5f5f5')+';color:'+(d.dev[i].s===1?'#4caf50':'#9e9e9e')+'">'+(d.dev[i].s===1?'在线':'离线')+'</span>';dl.appendChild(di)}var cl=$('ctrlLoc');cl.innerHTML='';for(var i=0;i<d.loc.length;i++){var ch=document.createElement('span');ch.className=i===curL?'chip active':'chip';ch.textContent=d.loc[i];ch.onclick=function(j){return function(){curL=j;refreshDev()}}(i);cl.appendChild(ch)}var cg=$('ctrlGrid');cg.innerHTML='';for(var i=0;i<d.ctl.length;i++){var c=d.ctl[i];cg.innerHTML+='<div class="ctrl"><div class="cn"> '+c.n+'</div><div class="cs '+(c.c===1?'on':'off')+'">'+c.s+'</div><div class="ca"><button class="aon" onclick="showToast(\''+c.n+' 已启动\')">启动</button><button class="aoff" onclick="showToast(\''+c.n+' 已停止\')">停止</button></div></div>'}}
// Data
function refreshData(){refreshAlarm();refreshHist()}
function refreshAlarm(){var d=IND[curI];var al=$('alarmList');al.innerHTML='';var lv=['p0','p1','p2'],bt=['pending','resolved','resolved'],txt=['未处理','已恢复','已恢复'];for(var i=0;i<d.alm.length;i++){var a=d.alm[i];al.innerHTML+='<div class="alarm"><div class="al"><div class="dot '+lv[a.l]+'"></div><div><div class="an">'+a.n+'</div><div class="ad">'+a.d+'</div></div></div><span class="ab '+bt[a.b]+'">'+txt[a.b]+'</span></div>'}}
function refreshHist(){var d=IND[curI];var l=$('histLoc');l.innerHTML='';for(var i=0;i<d.loc.length;i++){var ch=document.createElement('span');ch.className=i===curL?'chip active':'chip';ch.textContent=d.loc[i];ch.onclick=function(j){return function(){curL=j;refreshHist()}}(i);l.appendChild(ch)}var dt=d.val[curL]||d.val[0];var h='';for(var i=0;i<5;i++){var p=d.par[i%d.par.length],v=dt[p.k],val=typeof v==='number'?(v+(Math.random()-.5)*v*.1).toFixed(2):v;h+='<div style="display:flex;align-items:center;padding:5px 8px;border-bottom:1px solid #eceff1;background:#fff"><div style="flex:1"><div style="font-size:11px;color:#37474f">'+p.l+'</div><div style="font-size:8px;color:#b0bec5">2026-05-'+String(22+i).padStart(2,'0')+'</div></div><div style="font-size:13px;font-weight:600;font-family:monospace;color:'+p.c+'">'+val+'</div></div>'}var ht=$('histTable');if(ht)ht.innerHTML=h}
// Passport
function refreshPass(){var d=IND[curI];$('passContent').innerHTML='<div style="background:linear-gradient(135deg,#e3f2fd,#f5faff);border:1px solid #bbdefb;border-radius:10px;padding:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:13px;font-weight:600;color:#01579b"> '+d.pref+'护照 · '+(d.name)+'</div><div style="width:36px;height:36px;background:#fff;border-radius:4px;display:flex;align-items:center;justify-content:center;padding:3px"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1px;width:100%;height:100%"><div style="background:#37474f;border-radius:1px"></div><div style="background:#e4e9f2;border-radius:1px"></div><div style="background:#37474f;border-radius:1px"></div><div style="background:#e4e9f2;border-radius:1px"></div><div style="background:#37474f;border-radius:1px"></div><div style="background:#e4e9f2;border-radius:1px"></div><div style="background:#37474f;border-radius:1px"></div><div style="background:#e4e9f2;border-radius:1px"></div><div style="background:#37474f;border-radius:1px"></div></div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:10px;color:#607d8b"><span>批次 <b style="color:#37474f">BATCH-0526</b></span><span>状态 <b style="color:#4caf50">进行中</b></span><span>'+d.lp+' <b style="color:#37474f">'+d.loc[0]+'</b></span><span>产量 <b style="color:#37474f">预估1.2t</b></span></div><div style="font-size:10px;color:#90a4ae;margin-top:6px">环境数据自动归集 · 点击查看详情</div></div>'}
// Detail overlay
function openDetail(k){var d=IND[curI];var p=null;for(var i=0;i<d.par.length;i++){if(d.par[i].k===k){p=d.par[i];break}}if(!p)return;var dt=d.val[curL]||d.val[0];var v=dt[p.k];$('detailTitle').textContent=p.l+' · '+d.loc[curL];var times=['00:00','02:00','04:00','06:00','08:00','10:00','12:00','14:00','16:00','18:00','20:00','22:00'];var html='';for(var i=0;i<times.length;i++){var val=typeof v==='number'?Math.max(0,(v+(Math.random()-.5)*v*.25)).toFixed(2):v;html+='<tr><td style="padding:3px 6px;border-bottom:1px solid #eceff1">'+times[i]+'</td><td style="padding:3px 6px;border-bottom:1px solid #eceff1">'+val+'</td><td style="padding:3px 6px;border-bottom:1px solid #eceff1"><span style="font-size:8px;padding:1px 5px;background:#e8f5e9;color:#4caf50;border-radius:3px">正常</span></td></tr>'}var tb=$('detailBody');if(tb)tb.innerHTML=html;$('detailOverlay').classList.add('open')}
// Passport sub tab default
refreshPass();
// Init
updateBanner();refreshHome();
</script>
